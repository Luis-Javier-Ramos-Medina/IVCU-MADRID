const LEYENDA = [{"color":"#e74c3c","label":"Verde abundante (parques y zonas forestales)"},{"color":"#e67e22","label":"Vulnerabilidad contenida"},{"color":"#8e44ad","label":"Alta privación económica y contaminación"},{"color":"#2980b9","label":"Renta baja y escasez de verde"},{"color":"#27ae60","label":"Envejecimiento y déficit de verde"}];
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const tip     = document.getElementById('tooltip');
const W = canvas.width, H = canvas.height;
const PAD = 40;

const xs = DATA.map(d=>d.x), ys = DATA.map(d=>d.y);
const xMin=Math.min(...xs), xMax=Math.max(...xs);
const yMin=Math.min(...ys), yMax=Math.max(...ys);
const xR = xMax-xMin || 1, yR = yMax-yMin || 1;

function toCanvas(x, y) {
  return [
    PAD + (x - xMin) / xR * (W - 2*PAD),
    H - PAD - (y - yMin) / yR * (H - 2*PAD)
  ];
}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f9fafb'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1;
  [0.25,0.5,0.75].forEach(t=>{
    const gx = PAD + t*(W-2*PAD);
    const gy = PAD + t*(H-2*PAD);
    ctx.beginPath(); ctx.moveTo(gx,PAD); ctx.lineTo(gx,H-PAD); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(PAD,gy); ctx.lineTo(W-PAD,gy); ctx.stroke();
  });
  DATA.forEach(d=>{
    const [cx,cy] = toCanvas(d.x,d.y);
    ctx.beginPath();
    ctx.arc(cx,cy,5,0,2*Math.PI);
    ctx.fillStyle=d.color+'cc';
    ctx.fill();
    ctx.strokeStyle=d.color;
    ctx.lineWidth=0.8;
    ctx.stroke();
  });
}
draw();

const leyDiv = document.getElementById('leyenda');
LEYENDA.forEach(l=>{
  const el = document.createElement('div');
  el.className='ley-item';
  el.innerHTML=`<div class="ley-dot" style="background:${l.color}"></div>${l.label}`;
  leyDiv.appendChild(el);
});

canvas.addEventListener('mousemove', e=>{
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  let found = null;
  for(const d of DATA){
    const [cx,cy] = toCanvas(d.x,d.y);
    if(Math.hypot(cx-mx,cy-my)<8){ found=d; break; }
  }
  if(found){
    tip.style.display='block';
    tip.style.left=(mx+12)+'px'; tip.style.top=(my-8)+'px';
    tip.innerHTML=`<b>${found.label}</b><br>${found.perfil}<br>IVCU: ${found.ivcu.toFixed(3)}`;
  } else {
    tip.style.display='none';
  }
});
canvas.addEventListener('mouseleave',()=>tip.style.display='none');
</script>
